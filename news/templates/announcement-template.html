<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="京城市鐵公告。">
  <title>公告標題｜京城市鐵</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/cur-favicon.png">
  <link rel="apple-touch-icon" href="../../assets/images/cur-favicon.png">
  <meta name="theme-color" content="#2C718F">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<!--
  ANNOUNCEMENT DATA
  id: YYYYMMDD-XX
  category: service
  category_label: 服務公告
  date: 2026.00.00
  updated: 2026.00.00
  title: 公告標題
  hero_image: ../../assets/news/images/YYYYMMDD-XX-main.jpg
  attachments:
    - ../../assets/news/attachments/YYYYMMDD-XX-file.pdf

  建立本頁後，請在 ../../assets/js/news-data.js 的 items 最上方登記一次。
  首頁、最新公告與分類公告會由該資料自動更新。
-->
  <a class="skip-link" href="#main-content">跳到主要內容</a>
  <main id="main-content">
    <nav class="breadcrumb" aria-label="目前位置"><div class="container"><a href="../../index.html">首頁</a><span aria-hidden="true">›</span><a href="../index.html">公告與新聞</a><span aria-hidden="true">›</span><span>YYYYMMDD-XX</span></div></nav>
    <article class="announcement-page">
      <header class="announcement-header">
        <div class="container announcement-header-inner">
          <div><div class="section-kicker">NOTICE</div><h1>公告標題</h1></div>
          <dl class="announcement-meta">
            <div><dt>公告編號</dt><dd>YYYYMMDD-XX</dd></div>
            <div><dt>公告日期</dt><dd>2026.00.00</dd></div>
            <div><dt>分類</dt><dd>服務公告</dd></div>
            <div><dt>更新日期</dt><dd>2026.00.00</dd></div>
          </dl>
        </div>
      </header>
      <div class="container announcement-layout">
        <div class="announcement-body">
          <section class="announcement-hero-image announcement-hero-placeholder" aria-label="公告大圖"><span>本公告未附大圖</span></section>
          <section class="announcement-content">
            <h2>主文</h2>
            <p>請在此輸入公告主文。第一段建議先說明對旅客的影響、日期與適用範圍。</p>
            <p>第二段可說明替代方式、注意事項或後續查詢管道。</p>
          </section>
          <section class="announcement-attachments" aria-labelledby="attachments-title">
            <h2 id="attachments-title">附件</h2>
            <a href="../../assets/news/attachments/YYYYMMDD-XX-file.pdf" target="_blank" rel="noopener">附件名稱 PDF</a>
          </section>
        </div>
        <aside class="announcement-side"><strong>洽詢資訊</strong><p>請填入旅客洽詢、工程窗口或相關頁面說明。</p><a class="wide-outline-link" href="../index.html">返回公告列表</a></aside>
      </div>
    </article>
  </main>
</body>
</html>
